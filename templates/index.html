<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>biTorrent - {{ title }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./../static/style.css" />
</head>
<body>
    <div class="container container-navbar">
        <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">biTorrent</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for("home") }}">Home</a>
                </li>

                <li class="nav-item">
                <a class="nav-link" href="{{ url_for("account") }}">Account</a>
                </li>

                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for("download") }}">Downloads</a>
                </li>

                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for("upload") }}">Uploads</a>
                </li>

            </ul>
            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
            <form class="d-flex">
                <a class="btn btn-light" type="button" href="{{ url_for("register") }}">Register</a>
                
                <a class="btn" type="button" href="{{ url_for("login") }}">Log In</a>
            </form>
            </div>
        </div>
        </nav>
    </div>
    <div class="container text-center mt-3">
      <div class="row justify-content-center">
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} col-md-6">
                  {{ message }}
                </div>
              {% endfor %}
            {% endif %}
          {% endwith %}
      </div>
    </div>
    <div class="container">
        {% block content %}
        {% endblock content %}
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>
</body>
</html>
